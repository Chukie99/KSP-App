name: Build Mobile App (Android & iOS)

on:
  push:
    branches: [master]
    paths:
      - 'KSP-Mobile/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: KSP-Mobile
        run: npm install

      - name: Configure EAS
        working-directory: KSP-Mobile
        run: eas init --id 994e7124-e8f4-49c8-a8a4-c3d4d501c895
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        working-directory: KSP-Mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build -p android --profile preview --non-interactive

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: KSP-Mobile
        run: npm install

      - name: Configure EAS
        working-directory: KSP-Mobile
        run: eas init --id 994e7124-e8f4-49c8-a8a4-c3d4d501c895
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build IPA
        working-directory: KSP-Mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build -p ios --profile preview --non-interactive
